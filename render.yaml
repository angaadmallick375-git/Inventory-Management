# render.yaml — Render.com Blueprint
# Docs: https://render.com/docs/blueprint-spec
#
# Deploy with:
#   1. Push this repo to GitHub
#   2. Go to https://dashboard.render.com → New → Blueprint
#   3. Connect your repo — Render reads this file automatically

services:
  # ─── FastAPI Backend ────────────────────────────────────────────────────
  - type: web
    name: inventoryos-backend
    runtime: python
    region: oregon          # change to: oregon | frankfurt | singapore | ohio
    plan: free              # free | starter | standard | pro
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Render injects $PORT automatically — do NOT set it yourself
      - key: DATABASE_URL
        fromDatabase:
          name: inventoryos-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        # Set to your Vercel URL after deploying frontend. Use * for now.
        value: "*"
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ─── PostgreSQL Database ────────────────────────────────────────────────
databases:
  - name: inventoryos-db
    databaseName: inventory_db
    user: inventory_user
    region: oregon
    plan: free
