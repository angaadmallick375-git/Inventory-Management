version: "3.9"

services:
  # ─── PostgreSQL Database ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: inventory_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inventory_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Build DATABASE_URL from parts — no credentials hardcoded here
      DATABASE_URL:  postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      POSTGRES_HOST: db
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port ${BACKEND_PORT} --reload

  # ─── React Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inventory_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # VITE_BACKEND_URL: used by vite.config.js proxy → points to internal service
      VITE_BACKEND_URL: http://backend:${BACKEND_PORT}
      # FRONTEND_PORT: tells vite.config.js which port to listen on
      FRONTEND_PORT: ${FRONTEND_PORT}
      # VITE_API_URL: leave EMPTY in dev/Docker so Vite proxy handles /api/*
      # Set to your real API domain only for production builds.
      VITE_API_URL: ""
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
