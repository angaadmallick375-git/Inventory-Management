# netlify.toml — Netlify deployment configuration
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  base    = "frontend"        # Netlify builds from this subdirectory
  command = "npm run build"
  publish = "dist"            # Vite's output directory

[build.environment]
  NODE_VERSION = "20"
  # Set your deployed backend URL here (or override in Netlify dashboard)
  VITE_API_URL = "https://your-backend.onrender.com"

# ── SPA redirect: all paths → index.html (required for React Router) ────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security headers ─────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
